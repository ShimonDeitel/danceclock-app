name: Danceclock
options:
  bundleIdPrefix: com.shimondeitel.danceclock
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Danceclock:
    type: application
    platform: iOS
    sources:
      - path: Danceclock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.danceclock
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Danceclock/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DanceclockTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DanceclockTests
    dependencies:
      - target: Danceclock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.danceclock.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DanceclockUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DanceclockUITests
    dependencies:
      - target: Danceclock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.danceclock.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Danceclock:
    build:
      targets:
        Danceclock: all
        DanceclockTests: [test]
        DanceclockUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Danceclock.storekit
    test:
      config: Debug
      storeKitConfiguration: Danceclock.storekit
      targets:
        - DanceclockTests
        - DanceclockUITests
    archive:
      config: Release
